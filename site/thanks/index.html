<!DOCTYPE html>

<style>
:root{--bg:#070808;--ink:#f2efe8;--dim:#98a29b;--green:#2fbd82;--line:rgba(242,239,232,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Outfit",sans-serif;font-weight:300;
  min-height:100svh;display:grid;place-items:center;padding:24px;text-align:center}
h1{font-family:"Fraunces",serif;font-weight:380;font-size:clamp(38px,6vw,64px);letter-spacing:-.015em;margin-bottom:.3em}
h1 em{font-style:italic;color:var(--green)}
p{color:var(--dim);font-size:17px;line-height:1.7;max-width:46ch;margin:0 auto 30px}
a.btn{display:inline-flex;padding:14px 28px;border-radius:999px;border:1px solid var(--green);
  color:var(--green);text-decoration:none;font-size:15px;transition:all .4s}
a.btn:hover{background:var(--green);color:#04130c}
</style>
</head>
<body>
<div>
  <h1>Lovely. <em>Kettle's on.</em></h1>
  <p>Your demo request is with Paula — she'll come back to you personally, usually the same day,
    to plan a demonstration around what you love to eat.</p>

</div>
